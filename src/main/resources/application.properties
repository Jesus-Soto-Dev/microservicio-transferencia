spring.application.name=transferencias

# H2 en memoria
spring.datasource.url=jdbc:h2:mem:transferencias
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# URL del sistema legado bancario
# En desarrollo apunta a un mock, en producciˇn al banco real
banco.soap.url=http://localhost:9090/ws/CuentaService